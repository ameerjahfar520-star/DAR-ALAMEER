  <script>
    // Lazy load
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if(e.isIntersecting) {
          const img = e.target;
          img.src = img.dataset.src;
          img.onload = () => img.classList.add('loaded');
          observer.unobserve(img);
        }
      })
    }, {rootMargin: '200px'});
    document.querySelectorAll('img[data-src]').forEach(img => observer.observe(img));

    // Lightbox
    const imgs = ["Gemini_Generated_Image_4wg1yr4wg1yr4wg1.jpg","Gemini_Generated_Image_7oiz3u7oiz3u7oiz.jpg","Gemini_Generated_Image_g313vig313vig313.jpg","Gemini_Generated_Image_k0m82dk0m82dk0m8.jpg","Gemini_Generated_Image_ld3hzlld3hzlld3h.jpg","Gemini_Generated_Image_nmu3yonmu3yonmu3.jpg","Gemini_Generated_Image_rt7qtyrt7qtyrt7q.jpg","Gemini_Generated_Image_vas98tvas98tvas9.jpg"];
    let idx = 0;
    const lb = document.getElementById('lb');
    const lbImg = document.getElementById('lbImg');
    const lbInfo = document.getElementById('lbInfo');
    const lbSpin = document.getElementById('lbSpin');
    
    function lbOpen(fn) {
      idx = imgs.indexOf(fn);
      if(idx < 0) idx = 0;
      _lbShow();
      lb.classList.add('active');
    }
    
    function _lbShow() {
      const fn = imgs[idx];
      lbImg.style.opacity = 0;
      lbSpin.classList.add('active');
      lbInfo.textContent = fn;
      const tmp = new Image();
      tmp.onload = () => {
        lbImg.src = tmp.src;
        lbImg.style.opacity = 1;
        lbSpin.classList.remove('active');
      };
      tmp.src = 'media/full/' + fn;
    }
    
    function lbClose() {
      lb.classList.remove('active');
    }
    
    function lbNav(d, e) {
      if(e) e.stopPropagation();
      idx = (idx + d + imgs.length) % imgs.length;
      _lbShow();
    }
    
    // Close on background click
    lb.addEventListener('click', (e) => {
      if(e.target === lb || e.target.classList.contains('lb-content')) lbClose();
    });
    
    document.addEventListener('keydown', e => {
      if(!lb.classList.contains('active')) return;
      if(e.key === 'Escape') lbClose();
      if(e.key === 'ArrowLeft') lbNav(-1);
      if(e.key === 'ArrowRight') lbNav(1);
    });
  </script>
